name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build (debug)
        run: swift build
      - name: Build (release)
        run: ./build.sh
      - uses: actions/upload-artifact@v4
        with:
          name: iRelay
          path: iRelay.app
